name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run ruff check src tests

      - name: Mypy
        run: uv run mypy src tests

      - name: Quality budget
        run: uv run python scripts/check_quality_budget.py --max-any 20 --max-broad-catches 0

      - name: Pytest
        run: uv run pytest -q
